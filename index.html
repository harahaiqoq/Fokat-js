<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nielsen Mobile Refer & Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #B1E50E; }
        .main-container { background: white; border-radius: 3rem; min-height: 90vh; margin: 15px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .btn-custom { background-color: #B1E50E; border-radius: 50px; font-weight: 800; color: #000; transition: transform 0.2s; }
        .btn-custom:active { transform: scale(0.95); }
        .input-box { border: 2.5px solid #FF7909; border-radius: 30px; }
        .hidden { display: none; }
        @keyframes bounce-in {
            0% { transform: scale(0); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .animate-pop { animation: bounce-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="flex justify-center items-start pt-4">

    <div class="main-container w-full max-w-md relative pb-8">
        
        <div id="page1" class="p-6">
            <h1 class="text-[28px] font-extrabold text-left mt-2 leading-tight">Nielsen Mobile Refer & <br> Earn</h1>
            
            <div class="flex items-center mt-6 py-3 border-t border-gray-100">
                <img src="https://cdn-icons-png.flaticon.com/512/1997/1997874.png" class="w-10 mr-3">
                <p class="text-[#FF7909] font-bold text-[14px] leading-snug">
                    Get ₹200 When Users Completes the Task and Receive Their Reward.
                </p>
            </div>

            <div class="mt-10 relative flex justify-center">
                <img src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png" class="w-24 absolute -left-4 -top-8 z-10">
                <div class="btn-custom w-[85%] py-5 text-3xl text-center shadow-lg shadow-lime-200">
                    Rs.200/Refer
                </div>
            </div>

            <div class="mt-14 input-box flex items-center p-3 px-5 bg-white">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/UPI-Logo-vector.svg" class="w-12 border-r-2 border-[#018B3D] pr-3">
                <input type="text" id="userUpi" placeholder="Enter Your UPI ID" class="w-full pl-4 outline-none font-bold text-gray-800 text-lg">
            </div>

            <div class="flex justify-center mt-8">
                <button onclick="handleGenerate()" id="genBtn" class="btn-custom px-16 py-4 text-xl shadow-md">
                    Generate
                </button>
                <div id="loader" class="hidden py-4">
                    <div class="w-8 h-8 border-4 border-[#FF7909] border-t-transparent rounded-full animate-spin"></div>
                </div>
            </div>
        </div>

        <div id="page2" class="hidden p-6 text-center animate-pop">
            <h1 class="text-2xl font-extrabold mt-2">Nielsen Mobile Refer & Earn</h1>
            
            <div class="flex justify-center mt-12">
                <div class="bg-[#B1E50E] w-28 h-28 rounded-full flex items-center justify-center shadow-2xl shadow-lime-300">
                    <i class="fas fa-check text-5xl text-white"></i>
                </div>
            </div>

            <div class="mt-8 px-2">
                <p class="font-bold text-gray-800 text-lg">Refer Link for UPI: <br> <span id="displayUpi" class="text-[#018B3D] break-all"></span></p>
            </div>

            <div class="mt-8 input-box p-4 bg-gray-50 overflow-hidden mx-2">
                <p id="targetLink" class="text-sm font-bold text-blue-600 truncate italic"></p>
            </div>

            <div class="flex justify-center mt-8">
                <button onclick="copyLink()" class="btn-custom px-16 py-4 text-xl uppercase tracking-wider shadow-lg">
                    Copy Link
                </button>
            </div>
        </div>

        <div class="p-6 bg-white border-t-8 border-[#B1E50E] mt-4">
            <h3 class="text-xl font-extrabold mb-8">Extra Features:</h3>
            <div class="space-y-8 px-2">
                <div class="flex items-center gap-4">
                    <img src="https://cdn-icons-png.flaticon.com/512/1256/1256650.png" class="w-14">
                    <div class="btn-custom flex-1 py-4 text-center cursor-pointer shadow-sm">Track My Referrals</div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="btn-custom flex-1 py-4 text-center cursor-pointer shadow-sm">Custom Amount</div>
                    <img src="https://cdn-icons-png.flaticon.com/512/2040/2040523.png" class="w-14">
                </div>
            </div>
        </div>
    </div>

    <script>
        const links = [
            "https://offers.fokatcash.com/camp.php?ref=TLHBG&camp=Nsmb",
            "https://offers.fokatcash.com/camp.php?ref=QWPHC&camp=Nsmb",
            "https://offers.fokatcash.com/camp.php?ref=HVIYM&camp=Nsmd"
        ];

        function handleGenerate() {
            const upi = document.getElementById('userUpi').value.trim();
            
            if (!upi || !upi.includes('@')) {
                alert("Bhai, sahi UPI ID toh dalo!");
                return;
            }

            document.getElementById('genBtn').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');

            setTimeout(() => {
                const randomLink = links[Math.floor(Math.random() * links.length)];
                document.getElementById('displayUpi').innerText = upi;
                document.getElementById('targetLink').innerText = randomLink;
                document.getElementById('page1').classList.add('hidden');
                document.getElementById('page2').classList.remove('hidden');
                document.getElementById('genBtn').classList.remove('hidden');
                document.getElementById('loader').classList.add('hidden');
            }, 1000);
        }

        function copyLink() {
            const link = document.getElementById('targetLink').innerText.trim();
            navigator.clipboard.writeText(link).then(() => {
                alert("Referral Link Copied! 🚩");
            });
        }
    </script>
</body>
</html>
