<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refer & Earn - Nielsen Mobile</title>
    <link href="https://fonts.googleapis.com/css?family=Quicksand:400,500,700&subset=latin-ext" rel="stylesheet">
    <link href="css/style_1.css" rel="stylesheet">
    <link href="css/style_2.css" rel="stylesheet">
    
    <script>
        // RANDOM LINKS FOR ROTATION
        const RANDOM_LINKS = [
            "https://offers.fokatcash.com/camp.php?ref=TLHBG&camp=Nsmb",
            "https://offers.fokatcash.com/camp.php?ref=QWPHC&camp=Nsmb",
            "https://offers.fokatcash.com/camp.php?ref=HVIYM&camp=Nsmd"
        ];

        async function submitForm(event) {
            event.preventDefault();
            const upiInput = document.querySelector('input[name="number"]').value;
            
            if (!upiInput.includes('@')) {
                alert('Invalid UPI ID! ❌');
                return;
            }

            // Start Loading
            document.getElementById('sbmt').style.display = 'none';
            document.getElementById('spinner-1').style.display = 'flex';

            // Selected Random Link
            const selectedLink = RANDOM_LINKS[Math.floor(Math.random() * RANDOM_LINKS.length)];

            setTimeout(() => {
                // Hide Form & Banner
                document.getElementById('myForm').style.display = 'none';
                document.querySelector('.reward-banner').style.display = 'none';
                document.querySelector('.amount').style.display = 'none';
                document.getElementById('ofname').style.display = 'none';

                // Show Success Container (Style CSS 2 Logic)
                const mainContainer = document.querySelector('.main-container');
                mainContainer.style.display = 'flex';
                
                // Set Data
                document.getElementById('sucess-h2').innerHTML = `Refer Link for UPI: <span style="color: #018B3D;">${upiInput}</span>`;
                const linkField = document.getElementById('numberInput');
                linkField.value = selectedLink;
                linkField.style.display = 'block';

                // Adjust Box height for result
                document.querySelector('.box').style.height = 'auto';
                document.querySelector('.box').style.minHeight = '350px';
            }, 1200);
        }

        function copylink() {
            const linkField = document.getElementById("numberInput");
            linkField.select();
            navigator.clipboard.writeText(linkField.value).then(() => {
                alert("Refer Link Copied! 🚩");
            });
        }
    </script>
</head>
<body style="background-color: #B1E50E; display: flex; flex-direction: column; align-items: center; padding-top: 20px;">

    <div class="box" style="background: #fff; width: 90%; max-width: 400px; border-radius: 50px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center;">
        
        <div class="title" style="text-align: left; padding: 10px;">
            <h1 id="ofname" style="font-size: 26px; font-weight: 700; margin-bottom: 5px;">Nielsen Mobile Refer & Earn</h1>
        </div>

        <div class="reward-banner" style="display: flex; align-items: center; gap: 10px; padding: 10px; border-top: 1px solid #eee;">
            <img src="assets/megaphone.png" style="width: 35px;" alt="📢">
            <p style="color: #FF7909; font-weight: 700; font-size: 14px; text-align: left; margin: 0;">
                Get ₹<span id="amount">70</span> When Users Completes the Task and Receive Their Reward.
            </p>
        </div>

        <div class="amount" style="background-color: #B1E50E; border-radius: 40px; margin: 20px auto; width: 85%; height: 75px; display: flex; align-items: center; justify-content: center; position: relative;">
            <img src="assets/gift.png" style="width: 85px; position: absolute; left: -25px;" alt="🎁">
            <h2 id="peref" style="font-size: 28px; font-weight: 700; margin-left: 30px;">Rs.70/Refer</h2>
        </div>

        <form id="myForm" onsubmit="submitForm(event)">
            <div class="input-container" style="border: 2px solid #FF7909; border-radius: 35px; padding: 8px 15px; display: flex; align-items: center; background: #fff; margin-bottom: 20px;">
                <img src="assets/upi-logo.png" style="width: 55px; border-right: 2px solid #018B3D; padding-right: 10px;" alt="UPI">
                <input type="text" name="number" placeholder="Enter UPI ID (e.g. 87504xxx@ybl)" required 
                       style="border: none; outline: none; padding-left: 12px; font-size: 16px; width: 100%; font-family: 'Quicksand';">
            </div>
            
            <input type="submit" id="sbmt" class="submit" value="Generate" 
                   style="background-color: #B1E50E; color: #000; border: none; border-radius: 30px; width: 180px; height: 50px; font-size: 20px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            
            <div id="spinner-1" style="display:none; justify-content: center; margin-top: 15px;">
                <div class="loading-spinner"></div>
            </div>
        </form>

        <div class="main-container" style="display:none; flex-direction: column; align-items: center;">
            <div class="check-container">
                <div class="check-background">
                    <svg viewBox="0 0 65 51" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M7 25L27.3077 44L58 7" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>
            <h2 id="sucess-h2" style="font-size: 15px; margin: 15px 0;"></h2>
            <input type="text" id="numberInput" readonly class="copyinput" style="width: 90%; margin-bottom: 15px;">
            <button id="copybtn" onclick="copylink()" class="submit" style="background-color: #B1E50E; width: 160px; height: 45px; border-radius: 25px; border: none; font-weight: 700;">Copy Link</button>
        </div>
    </div>

    <div class="features" style="background: #fff; width: 90%; max-width: 400px; border-radius: 30px; padding: 20px; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);">
        <h3 style="text-align: left; margin-bottom: 20px; font-size: 20px;">Extra Features:</h3>
        
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
            <img src="assets/track.png" style="width: 55px;" alt="Track">
            <a href="javascript:void(0)" onclick="opentrackpopup()" 
               style="background: #B1E50E; flex: 1; padding: 12px; border-radius: 30px; text-decoration: none; color: #000; font-weight: 700; text-align: center;">
               Track My Referrals
            </a>
        </div>

        <div style="display: flex; align-items: center; gap: 10px;">
            <a href="javascript:void(0)" onclick="opencustompopup()" 
               style="background: #B1E50E; flex: 1; padding: 12px; border-radius: 30px; text-decoration: none; color: #000; font-weight: 700; text-align: center;">
               Custom Amount
            </a>
            <img src="assets/gear.png" style="width: 55px;" alt="Gear">
        </div>
    </div>

</body>
</html>
