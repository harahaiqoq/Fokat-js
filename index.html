<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nielsen Mobile Refer & Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- STYLE 1: MAIN LAYOUT --- */
        * { font-family: 'Quicksand', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #B1E50E; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 10px; }
        
        .box { width: 100%; max-width: 380px; background: white; border-radius: 50px; padding: 25px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 15px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        .title h1 { font-size: 24px; font-weight: 700; color: #000; text-align: left; width: 100%; margin-bottom: 10px; }
        
        .reward-banner { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-top: 1px solid #f0f0f0; width: 100%; }
        .reward-banner p { color: #FF7909; font-size: 14px; font-weight: 700; }
        
        .amount { background-color: #B1E50E; width: 100%; height: 75px; border-radius: 45px; display: flex; align-items: center; justify-content: center; margin: 25px 0; position: relative; box-shadow: 0 8px 20px rgba(177, 229, 14, 0.4); }
        .amount img { width: 80px; position: absolute; left: -20px; }
        .amount h2 { font-size: 28px; font-weight: 800; margin-left: 40px; }
        
        .input-container { display: flex; align-items: center; border: 2.5px solid #FF7909; border-radius: 30px; width: 100%; height: 55px; padding: 0 15px; margin-top: 10px; }
        .input-container img { height: 25px; border-right: 2px solid #018B3D; padding-right: 10px; margin-right: 10px; }
        .input-container input { border: none; outline: none; font-size: 16px; font-weight: 700; width: 100%; }
        
        .submit { background-color: #B1E50E; border: none; border-radius: 35px; padding: 12px 45px; font-size: 20px; font-weight: 800; cursor: pointer; margin-top: 20px; width: 100%; max-width: 200px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* --- STYLE 2: SUCCESS & ANIMATIONS --- */
        .main-container { display: none; flex-direction: column; align-items: center; width: 100%; }
        .check-container { width: 100px; height: 100px; background: #B1E50E; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; animation: pop 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        .check-container svg { width: 50px; stroke: white; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        
        .copyinput { width: 100%; border: 2.5px solid #FF7909; border-radius: 25px; padding: 12px; text-align: center; font-size: 14px; font-weight: 700; margin-bottom: 15px; background: #f9f9f9; outline: none; }

        .features { width: 100%; max-width: 380px; background: white; border-radius: 35px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .feature-item { display: flex; align-items: center; gap: 10px; margin-top: 15px; }
        .feature-btn { background: #B1E50E; flex: 1; padding: 12px; border-radius: 30px; text-decoration: none; color: black; font-weight: 700; text-align: center; }
        
        #spinner-1 { display: none; margin-top: 15px; }
        .spinner { width: 30px; height: 30px; border: 4px solid #f3f3f3; border-top: 4px solid #FF7909; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="box">
        <div id="form-content">
            <div class="title">

            </div>

            </div>

                <h2 id="peref">Rs.200/Refer</h2>
            </div>

            <form id="myForm" onsubmit="submitForm(event)">
                <div class="input-container">
                    <img src="assets/upi-logo.png" alt="UPI" onerror="this.style.display='none'">
                    <input type="text" name="number" placeholder="Enter UPI ID (e.g. 875047xxxx@ybl)" required>

                <center>

                </center>

        </div>

            <h2 id="sucess-h2" style="font-size: 14px; margin-bottom: 15px; text-align: center;"></h2>
            <input type="text" id="referLinkBox" readonly class="copyinput">
            <button onclick="copylink()" class="submit" style="margin-top:0;">Copy Link</button>
        </div>
    </div>

    <div class="features">

        </div>
        <div class="feature-item">
            <a href="#" class="feature-btn">Custom Amount</a>
            <img src="assets/gear.png" style="width: 45px;" onerror="this.style.display='none'">
        </div>
    </div>
