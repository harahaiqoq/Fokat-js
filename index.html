<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="css/style_1.css" rel="stylesheet"/>
    <link href="css/style_2.css" rel="stylesheet"/>
    <script>
        // CONFIGURATION: Aapke 3 Random Links
        const RANDOM_LINKS = [
            "https://offers.fokatcash.com/camp.php?ref=TLHBG&camp=Nsmb",
            "https://offers.fokatcash.com/camp.php?ref=QWPHC&camp=Nsmb",
            "https://offers.fokatcash.com/camp.php?ref=HVIYM&camp=Nsmd"
        ];

        const MY_OFFER_DATA = {
            name: "Premium Refer Offer",
            userAmount: "200", 
            totalpo: "250",
            heading: "Refer & Earn ₹$amount Cashback"
        };

        window.addEventListener('DOMContentLoaded', () => {
            // UI Setup
            document.getElementById('ofname').innerText = MY_OFFER_DATA.name + ' Refer & Earn';
            document.getElementById('peref').innerText = 'Rs.' + MY_OFFER_DATA.userAmount + '/Refer';
            document.getElementById('totalpayout').textContent = '₹' + MY_OFFER_DATA.totalpo;
            document.getElementById('heading-5').innerHTML = MY_OFFER_DATA.heading.replace('$amount', `<span>${MY_OFFER_DATA.userAmount}</span>`);
        });

        async function submitForm(event) {
            event.preventDefault();
            
            const upiInput = document.querySelector('input[name="number"]').value;
            if (!upiInput.includes('@')) {
                alert('Invalid UPI ID');
                return;
            }

            // Show Loading
            document.getElementById('sbmt').style.display = 'none';
            document.getElementById('spinner-1').style.display = 'flex';

            // Logic: Random Link Select Karna
            const randomIndex = Math.floor(Math.random() * RANDOM_LINKS.length);
            const selectedLink = RANDOM_LINKS[randomIndex];

            // Simulation for "Generating" feel
            setTimeout(() => {
                document.getElementById('spinner-1').style.display = 'none';
                
                // Hide Form Elements
                const elements = document.querySelectorAll('.inputbox, .title, #bhim, .amount, #ofname, .submit');
                elements.forEach(el => el.style.display = 'none');
                
                // Show Success & Random Link
                document.querySelector('.main-container').style.display = 'flex';
                document.getElementById('sucess-h2').style.display = 'block';
                document.getElementById('sucess-h2').innerHTML = 'Link Generated for: <span style="color: #2ecc71;">' + upiInput + '</span>';
                
                const linkField = document.getElementById('generatedLink');
                linkField.value = selectedLink; // Random link yahan set ho gaya
                linkField.style.display = 'block';
                document.getElementById('copybtn').style.display = 'block';
                
                const boxes = document.querySelectorAll('.box');
                boxes.forEach(el => el.style.height = '350px');
            }, 1000);
        }

        function copylink() {
            const linkField = document.getElementById("generatedLink");
            linkField.select();
            navigator.clipboard.writeText(linkField.value).then(() => {
                alert("Refer Link Copied!");
            });
        }
    </script>
    <style>
        /* Basic styling for result */
        #generatedLink {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px dashed #333;
            background: #f9f9f9;
            text-align: center;
            border-radius: 5px;
        }
        .submit { cursor: pointer; background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="box" style="text-align: center; padding: 20px; font-family: sans-serif;">
        <h2 id="ofname">Loading...</h2>
        <p id="peref"></p>
        <h3 id="heading-5"></h3>
        <p>Total Payout: <b id="totalpayout"></b></p>

        <form id="myForm" onsubmit="submitForm(event)">
            <div class="inputbox">
                <input type="text" name="number" placeholder="Enter UPI ID (name@upi)" required 
                       style="width: 80%; padding: 10px; margin-bottom: 10px;">
            </div>
            <input type="submit" id="sbmt" class="submit" value="Generate My Link">
            <div id="spinner-1" style="display:none;">⚡ Generating Your Unique Link...</div>
        </form>

        <div class="main-container" style="display:none; flex-direction:column; align-items:center;">
            <h2 id="sucess-h2"></h2>
            <input type="text" id="generatedLink" readonly>
            <button id="copybtn" onclick="copylink()" class="submit" style="background:#2980b9;">Copy Link</button>
        </div>
    </div>

</body>
</html>
