<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Quicksand:400,500,700&subset=latin-ext" rel="stylesheet">
    <link href="css/success-4.css" rel="stylesheet">
    <script src="js/popup-2.js" async></script>
    
    <script>
        // --- 1. CONFIGURATION (Bhai yahan 200 set kar diya hai) ---
        const REWARD_AMOUNT = "200"; 
        const REFER_LINKS = [
            "https://offers.fokatcash.com/camp.php?ref=TLHBG&camp=Nsmb",
            "https://offers.fokatcash.com/camp.php?ref=QWPHC&camp=Nsmb",
            "https://offers.fokatcash.com/camp.php?ref=HVIYM&camp=Nsmd"
        ];

        // --- 2. DYNAMIC DATA FETCHING ---
        const urlParams = new URLSearchParams(window.location.search);
        const camp = urlParams.get('camp') || 'Nielsen';
        const refValue = urlParams.get('ref') || '89DTS';
        const url = `https://offers.fokatcash.com/backend/detail1.php?ref=${refValue}&camp=${camp}&t=${new Date().getTime()}`;

        fetch(url, { cache: "no-cache" })
            .then(response => response.json())
            .then(data => {
                if (data.live_data && data.live_data.length > 0) {
                    const liveData = data.live_data[0];
                    // Update UI with 200rs (Bhai yahan force update hai)
                    document.getElementById('ofname').innerText = liveData.name + ' Refer & Earn';
                    document.getElementById('peref').innerText = 'Rs.' + REWARD_AMOUNT + '/Refer';
                    document.getElementById('amount').innerText = REWARD_AMOUNT;
                    
                    // Hidden Fields for Backend
                    document.getElementById('cn').value = camp;
                    window.trackable = liveData.trackable;
                    window.payablevent = liveData.payable_event;
                    hideLoader();
                }
            }).catch(err => console.error('Error:', err));

        // --- 3. FORM SUBMISSION (3-Link Rotation Logic) ---
        async function submitForm(event) {
            event.preventDefault();
            var inputField = document.querySelector('input[name="number"]');
            var upiId = inputField.value;

            if (!upiId.includes('@')) {
                alert('Invalid UPI ID');
                return false;
            }

            if (upiId.includes('@paytm')) {
                showPopup("We don't Support @paytm Upi. Please use another one.", '#ff0000');
                return false;
            }

            // Start Loading
            document.getElementById('sbmt').style.display = 'none';
            document.getElementById('spinner-1').style.display = 'flex';

            // Bhai ye hai link rotation ka logic
            const selectedLink = REFER_LINKS[Math.floor(Math.random() * REFER_LINKS.length)];

            setTimeout(() => {
                // UI Elements Chhupana
                const elements = document.querySelectorAll('.title, .reward-banner, .amount, .input-container, #sbmt');
                elements.forEach(el => el.style.display = 'none');

                // Success Container Dikhana
                document.querySelector('.main-container').style.display = 'flex';
                document.getElementById('sucess-h2').style.display = 'block';
                document.getElementById('sucess-h2').innerHTML = 'Refer Link for UPI: <span style="color: green;">' + upiId + '</span>';
                
                // Final Link Set Karna
                var linkDisplay = document.getElementById('numberInput');
                linkDisplay.value = selectedLink;
                linkDisplay.style.display = 'block';
                
                document.getElementById('spinner-1').style.display = 'none';
                document.querySelector('.box').style.height = 'auto';
                document.querySelector('.box').style.minHeight = '350px';
            }, 1200);
        }

        function copylink() {
            var copyText = document.getElementById("numberInput");
            copyText.select();
            navigator.clipboard.writeText(copyText.value).then(() => {
                alert("Link Copied! 🚩");
            });
        }

        function hideLoader() {
            document.getElementById("loader-container").style.display = "none";
        }
    </script>
</head>

<body style="background-color: #B1E50E; display: flex; flex-direction: column; align-items: center; padding-top: 20px;">

    <div id="loader-container" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; justify-content:center; align-items:center;">
        <div class="spinner"></div>
    </div>

    <div class="box">
        <div class="title" style="text-align: left; width: 100%; padding: 0 10px;">
            <h1 id="ofname" style="font-size: 24px;">Nielsen Mobile Refer & Earn</h1>
        </div>

        <div class="reward-banner" style="display: flex; align-items: center; gap: 10px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; width: 90%;">
            <img src="assets/megaphone.png" style="width: 35px;" alt="📢">
            <p style="color: #FF7909; font-weight: 700; font-size: 14px; margin: 0;">
                Get ₹<span id="amount">200</span> When Users Completes the Task and Receive Their Reward.
            </p>
        </div>

        <div class="amount" style="background-color: #B1E50E; width: 85%; height: 75px; border-radius: 40px; display: flex; align-items: center; justify-content: center; margin: 25px 0; position: relative;">
            <img src="assets/gift.png" style="width: 85px; position: absolute; left: -25px;" alt="🎁">
            <h2 id="peref" style="font-size: 28px; margin-left: 30px;">Rs.200/Refer</h2>
        </div>

        <form id="myForm" onsubmit="submitForm(event)">
            <div class="input-container">
                <img src="assets/upi-logo.png" style="width: 55px;" alt="UPI">
                <input type="text" name="number" placeholder="8750470086@ybl" required>
            </div>
            
            <input type="submit" id="sbmt" class="submit" value="Generate">
            
            <div id="spinner-1" style="display:none; justify-content: center; margin-top: 15px;">
                <div class="loading-spinner"></div>
            </div>
            
            <input type="hidden" id="cn" name="cn">
        </form>

        <div class="main-container" style="display:none; flex-direction: column; align-items: center;">
            <div class="check-container">
                <div class="check-background">
                    <svg viewBox="0 0 65 51" fill="none"><path d="M7 25L27.3077 44L58 7" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
            </div>
            <h2 id="sucess-h2" style="font-size: 14px; margin: 15px 0; text-align: center;"></h2>
            <input type="text" id="numberInput" readonly class="copyinput" style="width: 90%; margin-bottom: 15px; display:none;">
            <button id="copybtn" onclick="copylink()" class="submit" style="width: 160px;">Copy Link</button>
        </div>
    </div>

    <div class="features">
        <h3 style="width: 100%; text-align: left; margin-bottom: 20px;">Extra Features:</h3>
        <div style="display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 15px;">
            <img src="assets/track.png" style="width: 55px;">
            <a href="#" onclick="opentrackpopup()" class="feature-btn" style="background:#B1E50E; flex:1; text-align:center; padding:12px; border-radius:30px; text-decoration:none; color:black; font-weight:700;">Track My Referrals</a>
        </div>
        <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
            <a href="#" onclick="opencustompopup()" class="feature-btn" style="background:#B1E50E; flex:1; text-align:center; padding:12px; border-radius:30px; text-decoration:none; color:black; font-weight:700;">Custom Amount</a>
            <img src="assets/gear.png" style="width: 55px;">
        </div>
    </div>

</body>
    </html>
